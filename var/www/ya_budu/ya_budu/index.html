<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <meta name="background-color" content="#111111">
    <meta name="description" content="Быстрая доставка фаст-фуда - бургеры, пицца, роллы и многое другое">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЯБУДУ">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="ЯБУДУ">
    
    <title>ЯБУДУ | Доставка и готовка фаст-фуда</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="alternate icon" href="/icons/icon-72x72.png">
    <link rel="mask-icon" href="/icons/icon.svg" color="#FFD700">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png">
    <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="384x384" href="/icons/icon-384x384.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png">
    
    <!-- Preconnect для производительности -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Стили -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Splash Screen для iOS -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx?v=2.1"></script>
    
    <!-- Service Worker Registration -->
    <script>
        // Регистрация Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('[PWA] Service Worker зарегистрирован:', registration.scope);
                        
                        // Проверяем обновления
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('[PWA] Найдено обновление Service Worker');
                            
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // Новая версия доступна
                                    console.log('[PWA] Новая версия доступна!');
                                    // Можно показать уведомление пользователю
                                    if (confirm('Доступна новая версия приложения! Обновить сейчас?')) {
                                        newWorker.postMessage('skipWaiting');
                                        window.location.reload();
                                    }
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.log('[PWA] Ошибка регистрации Service Worker:', error);
                    });
                
                // Обработка сообщений от Service Worker
                navigator.serviceWorker.addEventListener('message', (event) => {
                    console.log('[PWA] Сообщение от SW:', event.data);
                });
                
                // Обработка обновления
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    console.log('[PWA] Контроллер изменен, перезагрузка...');
                    window.location.reload();
                });
            });
        } else {
            console.log('[PWA] Service Worker не поддерживается');
        }
        
        // Проверка возможности установки PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // Предотвращаем автоматический показ промпта
            e.preventDefault();
            deferredPrompt = e;
            console.log('[PWA] Приложение может быть установлено');
            
            // Можно показать кнопку установки
            // showInstallButton();
        });
        
        // Приложение установлено
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] Приложение установлено!');
            deferredPrompt = null;
        });
        
        // Функция для установки PWA (можно вызвать по кнопке)
        async function installPWA() {
            if (!deferredPrompt) {
                console.log('[PWA] Установка недоступна');
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[PWA] Результат установки:', outcome);
            deferredPrompt = null;
        }
        
        // Экспортируем для использования в React
        window.installPWA = installPWA;
        
        // Проверка режима standalone (установленное приложение)
        if (window.matchMedia('(display-mode: standalone)').matches || 
            window.navigator.standalone === true) {
            console.log('[PWA] Приложение запущено в standalone режиме');
            document.body.classList.add('pwa-standalone');
        }
    </script>
</body>
</html>
