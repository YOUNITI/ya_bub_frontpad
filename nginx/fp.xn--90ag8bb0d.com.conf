# Nginx config for Frontpad (fp.ябуду.com) - полная версия
# Используется для раздачи статики и проксирования API

server {
    server_name fp.xn--90ag8bb0d.com fp.ябуду.com www.fp.ябуду.com;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/xn--90ag8bb0d.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--90ag8bb0d.com/privkey.pem;
    
    # Корневая директория для статических файлов
    root /var/www/ya_budu/ya_budu/frontpad/static;
    index index.html;
    
    # Статические файлы с долгим кэшем
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Uploads - раздаём напрямую с файловой системы (ПРИОРИТЕТ!)
    location ^~ /uploads/ {
        alias /var/www/ya_budu/ya_budu/frontpad/server/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        autoindex off;
    }
    
    # API - проксируем на Node.js (порт 3005)
    location /api {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WebSocket - проксируем на Node.js (порт 3005)
    location /ws {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # Звуковые файлы
    location /sounds/ {
        alias /var/www/ya_budu/ya_budu/frontpad/static/sounds/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # SPA fallback - для React роутера
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTP redirect to HTTPS
server {
    server_name fp.xn--90ag8bb0d.com fp.ябуду.com www.fp.ябуду.com;
    listen 80;
    return 301 https://$host$request_uri;
}
